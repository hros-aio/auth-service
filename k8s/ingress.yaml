apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hrms-auth-ingress
  namespace: hrms
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: hrms-auth-service
                port:
                  number: 3000
