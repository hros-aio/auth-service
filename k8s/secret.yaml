# IMPORTANT: Do NOT commit real secrets here.
# Use an ExternalSecret (e.g. external-secrets.io) or SealedSecret to provision
# the hrms-access-secrets Secret at deploy time. The keys below are the required
# secret keys; their values must be injected by the secret-management pipeline.
#
# Example ExternalSecret (external-secrets.io):
#
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: hrms-access-secrets
#   namespace: hrms
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: cluster-secret-store
#     kind: ClusterSecretStore
#   target:
#     name: hrms-access-secrets
#     creationPolicy: Owner
#   data:
#     - secretKey: DB_PASSWORD
#       remoteRef:
#         key: hrms/access-service
#         property: db_password
#     - secretKey: JWT_PUBLIC_KEY
#       remoteRef:
#         key: hrms/access-service
#         property: jwt_public_key
