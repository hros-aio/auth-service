apiVersion: apps/v1
kind: Deployment
metadata:
  name: hrms-auth-service
  namespace: hrms
  labels:
    app: hrms-auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hrms-auth-service
  template:
    metadata:
      labels:
        app: hrms-auth-service
    spec:
      containers:
        - name: hrms-auth-service
          image: hrms-auth-service:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: hrms-auth-config
            - secretRef:
                name: hrms-auth-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
