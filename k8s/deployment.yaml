apiVersion: apps/v1
kind: Deployment
metadata:
  name: hrms-access-service
  namespace: hrms
  labels:
    app: hrms-access-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hrms-access-service
  template:
    metadata:
      labels:
        app: hrms-access-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: hrms-access-service
          image: hrms-access-service:1.0.0
          ports:
            - containerPort: 3000
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: hrms-access-config
            - secretRef:
                name: hrms-access-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
