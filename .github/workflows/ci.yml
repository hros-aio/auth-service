name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: hrms_user
          POSTGRES_PASSWORD: hrms_password
          POSTGRES_DB: hrms_auth_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Check out auth-service into admin-module/auth-svc so that
      # link:../../api-factory/... resolves correctly relative to it.
      - name: Checkout auth-service
        uses: actions/checkout@v4
        with:
          path: admin-module/auth-svc
          persist-credentials: false

      # Check out the shared api-factory at the path the link: overrides expect:
      # admin-module/auth-svc → ../../api-factory = api-factory
      - name: Checkout api-factory (shared libraries)
        uses: actions/checkout@v4
        with:
          repository: hros-aio/apis-factory
          path: api-factory
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Build shared libraries
        working-directory: api-factory
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile
          pnpm run build --filter="@new-hros/libs-core" --filter="@new-hros/libs-sql" --filter="@new-hros/libs-apis"

      - name: Install Dependencies
        working-directory: admin-module/auth-svc
        run: pnpm install --frozen-lockfile

      - name: Code Formatting Check
        working-directory: admin-module/auth-svc
        run: pnpm run format:check

      - name: Code Linting
        working-directory: admin-module/auth-svc
        run: pnpm run lint

      - name: Run Unit Tests
        working-directory: admin-module/auth-svc
        run: pnpm run test:cov

      - name: Run E2E Tests
        working-directory: admin-module/auth-svc
        run: pnpm run test:e2e
