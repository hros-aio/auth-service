name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CI: true
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USERNAME: hrms_user
      DATABASE_PASSWORD: hrms_password
      DATABASE_NAME: hrms_auth_db_test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: hrms_user
      DB_PASSWORD: hrms_password
      DB_NAME: hrms_auth_db_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_PRIVATE_KEY: mock-private-key

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: hrms_user
          POSTGRES_PASSWORD: hrms_password
          POSTGRES_DB: hrms_auth_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Check out auth-service into admin-module/auth-svc so that
      # link:../../api-factory/... resolves correctly relative to it.
      - name: Checkout auth-service
        uses: actions/checkout@v4
        with:
          path: admin-module/auth-svc
          persist-credentials: false

      # Check out the shared api-factory at the path the link: overrides expect.
      # api-factory uses npm (package-lock.json) and commits its dist/ output,
      # so no install or build step is required — the checkout is sufficient.
      - name: Checkout api-factory (shared libraries)
        uses: actions/checkout@v4
        with:
          repository: hros-aio/apis-factory
          path: api-factory
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies in api-factory
        working-directory: api-factory
        run: npm ci

      - name: Build shared libraries in api-factory
        working-directory: api-factory
        run: npm run build

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Install Dependencies
        working-directory: admin-module/auth-svc
        run: pnpm install --frozen-lockfile

      - name: Code Formatting Check
        working-directory: admin-module/auth-svc
        run: pnpm exec prettier --check "src/**/*.ts" "test/**/*.ts"

      - name: Code Linting
        working-directory: admin-module/auth-svc
        run: pnpm exec eslint "{src,apps,libs,test}/**/*.ts"

      - name: Build
        working-directory: admin-module/auth-svc
        run: pnpm run build

      - name: Run Tests With Coverage
        working-directory: admin-module/auth-svc
        run: pnpm run test:cov

      - name: Run E2E Tests
        working-directory: admin-module/auth-svc
        run: pnpm run test:e2e
